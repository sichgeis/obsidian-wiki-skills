version: "3"

vars:
  SKILL_NAME: fundus
  LEGACY_SKILL_PREFIX: obsidian
  LEGACY_SKILL_SUFFIX: wiki
  RETIRED_PROMPT_NAME: document.md
  PYTHON:
    sh: command -v python || command -v python3
  HOME_DIR:
    sh: printf %s "$HOME"
  BUILD_ROOT: dist
  BUILD_DIR: "{{.BUILD_ROOT}}/{{.SKILL_NAME}}"
  CODEX_SKILLS_DIR: "{{.HOME_DIR}}/.codex/skills"
  CODEX_PROMPTS_DIR: "{{.HOME_DIR}}/.codex/prompts"

tasks:
  build:
    desc: Build the Codex skill package
    run: once
    cmds:
      - rm -rf "{{.BUILD_DIR}}"
      - rm -rf "{{.BUILD_ROOT}}/{{.LEGACY_SKILL_PREFIX}}-{{.LEGACY_SKILL_SUFFIX}}"
      - mkdir -p "{{.BUILD_DIR}}/scripts"
      - mkdir -p "{{.BUILD_DIR}}/agents"
      - cp SKILL.md config.json requirements.txt "{{.BUILD_DIR}}/"
      - cp scripts/fundus.py scripts/fundus_mcp.py "{{.BUILD_DIR}}/scripts/"
      - cp agents/openai.yaml "{{.BUILD_DIR}}/agents/openai.yaml"

  install:
    desc: Install the skill for Codex
    cmds:
      - task: install:codex

  install:codex:
    desc: Install the skill for Codex
    deps: [build]
    cmds:
      - mkdir -p "{{.CODEX_SKILLS_DIR}}"
      - rm -rf "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}"
      - rm -rf "{{.CODEX_SKILLS_DIR}}/{{.LEGACY_SKILL_PREFIX}}-{{.LEGACY_SKILL_SUFFIX}}"
      - rm -f "{{.CODEX_PROMPTS_DIR}}/{{.RETIRED_PROMPT_NAME}}"
      - cp -R "{{.BUILD_DIR}}" "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}"

  verify:
    desc: Verify the built skill package and script entrypoint
    deps: [build]
    cmds:
      - test -f "{{.BUILD_DIR}}/SKILL.md"
      - test -f "{{.BUILD_DIR}}/config.json"
      - test -f "{{.BUILD_DIR}}/requirements.txt"
      - test -f "{{.BUILD_DIR}}/agents/openai.yaml"
      - test -f "{{.BUILD_DIR}}/scripts/fundus.py"
      - test -f "{{.BUILD_DIR}}/scripts/fundus_mcp.py"
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" "{{.BUILD_DIR}}/scripts/fundus.py" --help
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" "{{.BUILD_DIR}}/scripts/fundus_mcp.py" --help
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" -m unittest discover -s tests

  verify:codex:
    desc: Verify the Codex installation
    cmds:
      - test -f "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}/SKILL.md"
      - test -f "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}/config.json"
      - test -f "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}/requirements.txt"
      - test -f "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}/agents/openai.yaml"
      - test -f "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}/scripts/fundus.py"
      - test -f "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}/scripts/fundus_mcp.py"
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}/scripts/fundus.py" --help
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}/scripts/fundus_mcp.py" --help
