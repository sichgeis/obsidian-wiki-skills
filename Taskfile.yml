version: "3"

vars:
  SKILL_NAME: fundus
  LEGACY_SKILL_PREFIX: obsidian
  LEGACY_SKILL_SUFFIX: wiki
  RETIRED_PROMPT_NAME: document.md
  PYTHON:
    sh: command -v python3 || command -v python
  HOME_DIR:
    sh: printf %s "$HOME"
  BUILD_ROOT: dist
  BUILD_DIR: "{{.BUILD_ROOT}}/{{.SKILL_NAME}}"
  PLUGIN_BUILD_DIR: "{{.BUILD_ROOT}}/{{.SKILL_NAME}}-plugin"
  PLUGIN_MARKETPLACE_DIR: "{{.BUILD_ROOT}}/{{.SKILL_NAME}}-marketplace"
  PLUGIN_CACHEBUSTER: "{{.HOME_DIR}}/.codex/skills/.system/plugin-creator/scripts/update_plugin_cachebuster.py"
  PLUGIN_VALIDATOR: "{{.HOME_DIR}}/.codex/skills/.system/plugin-creator/scripts/validate_plugin.py"
  CODEX_SKILLS_DIR: "{{.HOME_DIR}}/.codex/skills"
  CODEX_PROMPTS_DIR: "{{.HOME_DIR}}/.codex/prompts"

tasks:
  build:
    desc: Build the Codex skill package
    run: once
    cmds:
      - rm -rf "{{.BUILD_DIR}}"
      - rm -rf "{{.BUILD_ROOT}}/{{.LEGACY_SKILL_PREFIX}}-{{.LEGACY_SKILL_SUFFIX}}"
      - mkdir -p "{{.BUILD_DIR}}/scripts"
      - mkdir -p "{{.BUILD_DIR}}/agents"
      - mkdir -p "{{.BUILD_DIR}}/docs/reference"
      - cp SKILL.md config.json requirements.txt LICENSE THIRD_PARTY_LICENSES.md RELEASE_NOTES.md "{{.BUILD_DIR}}/"
      - cp scripts/fundus.py scripts/fundus_mcp.py scripts/fundus_mcp_launcher.sh "{{.BUILD_DIR}}/scripts/"
      - cp -R scripts/fundus_core "{{.BUILD_DIR}}/scripts/fundus_core"
      - cp -R vendor "{{.BUILD_DIR}}/vendor"
      - cp agents/openai.yaml "{{.BUILD_DIR}}/agents/openai.yaml"
      - cp docs/reference/*.md "{{.BUILD_DIR}}/docs/reference/"

  build:plugin:
    desc: Build the Codex plugin package
    deps: [build]
    run: once
    cmds:
      - rm -rf "{{.PLUGIN_BUILD_DIR}}"
      - mkdir -p "{{.PLUGIN_BUILD_DIR}}/.codex-plugin"
      - mkdir -p "{{.PLUGIN_BUILD_DIR}}/skills"
      - cp .codex-plugin/plugin.json "{{.PLUGIN_BUILD_DIR}}/.codex-plugin/plugin.json"
      - cp .mcp.json "{{.PLUGIN_BUILD_DIR}}/.mcp.json"
      - cp LICENSE THIRD_PARTY_LICENSES.md RELEASE_NOTES.md "{{.PLUGIN_BUILD_DIR}}/"
      - cp -R "{{.BUILD_DIR}}" "{{.PLUGIN_BUILD_DIR}}/skills/{{.SKILL_NAME}}"

  build:plugin-marketplace:
    desc: Build a local marketplace folder for plugin testing
    deps: [build:plugin]
    run: once
    cmds:
      - rm -rf "{{.PLUGIN_MARKETPLACE_DIR}}"
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" scripts/build_plugin_marketplace.py "{{.PLUGIN_MARKETPLACE_DIR}}" "{{.PLUGIN_BUILD_DIR}}" "{{.SKILL_NAME}}"

  plugin:refresh:
    desc: Build the local plugin marketplace for Codex testing
    deps: [build:plugin-marketplace]

  migrate:dry-run:
    desc: Inspect the Wiki to Fundus migration plan
    deps: [build]
    cmds:
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" "{{.BUILD_DIR}}/scripts/fundus.py" migrate wiki-to-fundus --dry-run

  migrate:apply:
    desc: Apply the Wiki to Fundus migration through backup, staging, verification, and source retirement
    deps: [build]
    cmds:
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" "{{.BUILD_DIR}}/scripts/fundus.py" migrate wiki-to-fundus --apply

  migrate:verify:
    desc: Verify the canonical Fundus corpus after migration
    deps: [build]
    cmds:
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" "{{.BUILD_DIR}}/scripts/fundus.py" migrate wiki-to-fundus --verify

  audit:tokens:
    desc: Measure skill, plugin, MCP, and representative output footprint
    cmds:
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" scripts/audit_token_budget.py

  benchmark:search:
    desc: Measure the 2,000-note Fundus rebuild and warm-search release target
    cmds:
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" scripts/benchmark_search.py --notes 2000 --iterations 25 --assert-p95-ms 100

  check:docs:
    desc: Check release, configuration, tool-surface, and architecture documentation consistency
    cmds:
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" scripts/check_documentation.py

  test:release-smoke:
    desc: Exercise proposal, mutation, retrieval, archive, index, and verification through the CLI in a temporary vault
    cmds:
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" scripts/release_smoke_test.py

  test:concurrency:
    desc: Run the cross-process lock, conflict, rollback, and recovery contract tests
    cmds:
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" -m unittest tests.test_fundus.MutationSafetyTest

  test:mcp-integration:
    desc: Exercise the source and exact packaged MCP commands with an independent client
    deps: [build:plugin]
    cmds:
      - FUNDUS_PLUGIN_ROOT="{{.PLUGIN_BUILD_DIR}}" PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" -m unittest tests.test_fundus_mcp_integration

  install:
    desc: Install the Fundus Codex plugin from the local marketplace
    cmds:
      - task: install:plugin

  install:plugin:
    desc: Refresh, cache-bust, and install the local Fundus Codex plugin
    deps: [plugin:refresh]
    cmds:
      - |
        if test -f "{{.PLUGIN_CACHEBUSTER}}"; then
          PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" "{{.PLUGIN_CACHEBUSTER}}" "{{.PLUGIN_MARKETPLACE_DIR}}/plugins/{{.SKILL_NAME}}"
        else
          echo "Skipping plugin cachebuster: {{.PLUGIN_CACHEBUSTER}} not found"
        fi
      - codex plugin add "{{.SKILL_NAME}}@{{.SKILL_NAME}}-local"

  install:codex:
    desc: Legacy direct skill install for Codex; do not use alongside the plugin
    deps: [build]
    cmds:
      - mkdir -p "{{.CODEX_SKILLS_DIR}}"
      - rm -rf "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}"
      - rm -rf "{{.CODEX_SKILLS_DIR}}/{{.LEGACY_SKILL_PREFIX}}-{{.LEGACY_SKILL_SUFFIX}}"
      - rm -f "{{.CODEX_PROMPTS_DIR}}/{{.RETIRED_PROMPT_NAME}}"
      - cp -R "{{.BUILD_DIR}}" "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}"

  verify:
    desc: Verify the built skill and plugin packages
    deps: [build, build:plugin, build:plugin-marketplace]
    cmds:
      - test -f "{{.BUILD_DIR}}/SKILL.md"
      - test -f "{{.BUILD_DIR}}/config.json"
      - test -f "{{.BUILD_DIR}}/requirements.txt"
      - test -f "{{.BUILD_DIR}}/LICENSE"
      - test -f "{{.BUILD_DIR}}/THIRD_PARTY_LICENSES.md"
      - test -f "{{.BUILD_DIR}}/RELEASE_NOTES.md"
      - test -f "{{.BUILD_DIR}}/agents/openai.yaml"
      - test -f "{{.BUILD_DIR}}/docs/reference/fundus-cli-reference.md"
      - test -f "{{.BUILD_DIR}}/docs/reference/fundus-workbench-examples.md"
      - test -f "{{.BUILD_DIR}}/scripts/fundus.py"
      - test -f "{{.BUILD_DIR}}/scripts/fundus_mcp.py"
      - test -x "{{.BUILD_DIR}}/scripts/fundus_mcp_launcher.sh"
      - test -f "{{.BUILD_DIR}}/scripts/fundus_core/runtime.py"
      - test -f "{{.BUILD_DIR}}/scripts/fundus_core/mcp_server.py"
      - test -f "{{.BUILD_DIR}}/vendor/ruamel/yaml/__init__.py"
      - test -f "{{.BUILD_DIR}}/vendor/ruamel_yaml-0.19.1.dist-info/licenses/LICENSE"
      - test -f "{{.PLUGIN_BUILD_DIR}}/.codex-plugin/plugin.json"
      - test -f "{{.PLUGIN_BUILD_DIR}}/.mcp.json"
      - test -f "{{.PLUGIN_BUILD_DIR}}/LICENSE"
      - test -f "{{.PLUGIN_BUILD_DIR}}/THIRD_PARTY_LICENSES.md"
      - test -f "{{.PLUGIN_BUILD_DIR}}/RELEASE_NOTES.md"
      - test -f "{{.PLUGIN_BUILD_DIR}}/skills/{{.SKILL_NAME}}/SKILL.md"
      - test -f "{{.PLUGIN_MARKETPLACE_DIR}}/.agents/plugins/marketplace.json"
      - test -f "{{.PLUGIN_MARKETPLACE_DIR}}/plugins/{{.SKILL_NAME}}/.codex-plugin/plugin.json"
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" "{{.BUILD_DIR}}/scripts/fundus.py" --help
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" "{{.BUILD_DIR}}/scripts/fundus_mcp.py" --help
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" "{{.BUILD_DIR}}/scripts/fundus_mcp.py" --check
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" scripts/audit_token_budget.py
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" scripts/validate_plugin_package.py "{{.PLUGIN_BUILD_DIR}}"
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" scripts/verify_release_consistency.py .codex-plugin/plugin.json "{{.PLUGIN_BUILD_DIR}}" "{{.PLUGIN_MARKETPLACE_DIR}}"
      - task: check:docs
      - task: test:release-smoke
      - task: test:mcp-integration
      - |
        if test -f "{{.PLUGIN_VALIDATOR}}"; then
          if PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" -c "import importlib.util, sys; sys.exit(0 if importlib.util.find_spec('yaml') else 1)"; then
            PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" "{{.PLUGIN_VALIDATOR}}" "{{.PLUGIN_BUILD_DIR}}"
          else
            echo "Skipping external plugin validator: PyYAML is not installed for {{.PYTHON}}"
          fi
        fi
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" -m unittest discover -s tests

  verify:codex:
    desc: Verify the Codex installation
    cmds:
      - test -f "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}/SKILL.md"
      - test -f "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}/config.json"
      - test -f "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}/requirements.txt"
      - test -f "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}/agents/openai.yaml"
      - test -f "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}/docs/reference/fundus-cli-reference.md"
      - test -f "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}/docs/reference/fundus-workbench-examples.md"
      - test -f "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}/scripts/fundus.py"
      - test -f "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}/scripts/fundus_mcp.py"
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}/scripts/fundus.py" --help
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}/scripts/fundus_mcp.py" --help
      - PYTHONDONTWRITEBYTECODE=1 "{{.PYTHON}}" "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}/scripts/fundus_mcp.py" --check
