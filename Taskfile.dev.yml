version: "3"

vars:
  SKILL_NAME: obsidian-wiki
  CODEX_SKILLS_DIR: /Users/christian/.codex/skills
  INSTALL_DIR: "{{.CODEX_SKILLS_DIR}}/{{.SKILL_NAME}}"

tasks:
  install:
    desc: Install the Codex skill into the local Codex skills directory
    cmds:
      - mkdir -p "{{.CODEX_SKILLS_DIR}}"
      - rm -rf "{{.INSTALL_DIR}}"
      - mkdir -p "{{.INSTALL_DIR}}/scripts"
      - cp SKILL.md config.json "{{.INSTALL_DIR}}/"
      - cp scripts/obsidian_wiki.py "{{.INSTALL_DIR}}/scripts/"

  verify:
    desc: Verify the installed skill files and script entrypoint
    cmds:
      - test -f "{{.INSTALL_DIR}}/SKILL.md"
      - test -f "{{.INSTALL_DIR}}/config.json"
      - test -f "{{.INSTALL_DIR}}/scripts/obsidian_wiki.py"
      - python "{{.INSTALL_DIR}}/scripts/obsidian_wiki.py" --help
